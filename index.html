<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS HUB - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --neon-cyan: #00f0ff;
            --neon-pink: #ff006e;
            --neon-purple: #8b5cf6;
            --dark-bg: #0a0a0f;
            --card-bg: rgba(15, 15, 25, 0.8);
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
            background: var(--dark-bg);
            color: #fff;
            overflow: hidden;
        }

        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px),
                        linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            animation: float 8s ease-in-out infinite;
        }

        .orb-1 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(0, 240, 255, 0.3), transparent 70%); top: -100px; left: -100px; }
        .orb-2 { width: 300px; height: 300px; background: radial-gradient(circle, rgba(255, 0, 110, 0.3), transparent 70%); bottom: -50px; right: -50px; animation-delay: -4s; }
        .orb-3 { width: 200px; height: 200px; background: radial-gradient(circle, rgba(139, 92, 246, 0.3), transparent 70%); top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: -2s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(30px, -30px); }
            50% { transform: translate(-20px, 20px); }
            75% { transform: translate(-30px, -20px); }
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--neon-cyan);
            border-radius: 50%;
            animation: particleFloat 10s linear infinite;
            box-shadow: 0 0 6px var(--neon-cyan);
        }

        @keyframes particleFloat {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) scale(1); opacity: 0; }
        }

        .login-container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-box {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 20px;
            padding: 60px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            animation: boxSlideUp 1s ease-out;
        }

        @keyframes boxSlideUp {
            0% { opacity: 0; transform: translateY(50px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .logo { text-align: center; margin-bottom: 50px; }

        .logo-icon {
            font-size: 60px;
            margin-bottom: 15px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { filter: drop-shadow(0 0 20px var(--neon-cyan)); transform: scale(1); }
            50% { filter: drop-shadow(0 0 40px var(--neon-cyan)); transform: scale(1.05); }
        }

        .logo h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 42px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 4px;
        }

        .logo p {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-top: 10px;
        }

        .form-group { margin-bottom: 30px; position: relative; }

        .form-group label {
            display: block;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .input-wrapper { position: relative; }

        .input-wrapper input {
            width: 100%;
            padding: 18px 20px 18px 55px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            font-family: 'Rajdhani', sans-serif;
            transition: all 0.3s ease;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.3), 0 0 40px rgba(0, 240, 255, 0.1);
        }

        .input-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(0, 240, 255, 0.5);
            font-size: 18px;
        }

        .ai-status {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
            padding: 15px;
            background: rgba(0, 240, 255, 0.05);
            border: 1px solid rgba(0, 240, 255, 0.1);
            border-radius: 10px;
        }

        .ai-dot {
            width: 10px;
            height: 10px;
            background: #00ff88;
            border-radius: 50%;
            animation: aiPulse 2s ease-in-out infinite;
        }

        @keyframes aiPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.7); }
            50% { box-shadow: 0 0 0 10px rgba(0, 255, 136, 0); }
        }

        .ai-status span { font-size: 13px; color: rgba(255, 255, 255, 0.7); }

        .btn-login {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
            border: none;
            border-radius: 12px;
            color: #000;
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 3px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transition: left 0.5s ease;
        }

        .btn-login:hover::before { left: 100%; }
        .btn-login:hover { transform: translateY(-3px); box-shadow: 0 10px 40px rgba(0, 240, 255, 0.4); }

        .register-link { text-align: center; margin-top: 30px; }

        .register-link a {
            color: var(--neon-cyan);
            text-decoration: none;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .register-link a:hover { text-shadow: 0 0 20px var(--neon-cyan); }

        .admin-badge {
            display: inline-block;
            background: var(--neon-pink);
            color: #fff;
            font-size: 9px;
            padding: 3px 8px;
            border-radius: 4px;
            margin-top: 5px;
        }

        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0, 0, 0, 0.1), rgba(0, 0, 0, 0.1) 1px, transparent 1px, transparent 2px);
            pointer-events: none;
            z-index: 100;
            opacity: 0.3;
        }

        .corner {
            position: fixed;
            width: 100px;
            height: 100px;
            border: 2px solid rgba(0, 240, 255, 0.3);
            z-index: 5;
        }

        .corner-tl { top: 20px; left: 20px; border-right: none; border-bottom: none; }
        .corner-tr { top: 20px; right: 20px; border-left: none; border-bottom: none; }
        .corner-bl { bottom: 20px; left: 20px; border-right: none; border-top: none; }
        .corner-br { bottom: 20px; right: 20px; border-left: none; border-top: none; }
    </style>
</head>
<body>
    <div class="bg-animation">
        <div class="grid-overlay"></div>
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="particles" id="particles"></div>

    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <div class="login-container">
        <div class="login-box">
            <div class="logo">
                <div class="logo-icon">&#9881;</div>
                <h1>NEXUS HUB</h1>
                <p>Project Collaboration Platform</p>
            </div>

            <div class="ai-status">
                <div class="ai-dot"></div>
                <span>AI System Active - Neural Network Connected</span>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label>Username</label>
                    <div class="input-wrapper">
                        <span class="input-icon">&#9679;</span>
                        <input type="text" id="username" placeholder="Enter username" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">&#9679;</span>
                        <input type="password" id="password" placeholder="Enter password" required>
                    </div>
                </div>

                <button type="submit" class="btn-login">
                    <span>INITIALIZE</span>
                </button>
            </form>

            <div class="register-link">
                <a href="register.html">New Member? Create Account</a>
            </div>
        </div>
    </div>

    <div class="scanlines"></div>

    <script>
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 10 + 's';
            particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
            particlesContainer.appendChild(particle);
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            // Admin credentials
            if (username.toLowerCase() === 'satyajeet18' && password === '4918') {
                localStorage.setItem('nexusUser', username);
                localStorage.setItem('nexusFullname', 'Admin');
                localStorage.setItem('nexusIsAdmin', 'true');
                window.location.href = 'dashboard.html';
                return;
            }

            // Check saved users
            const savedUsers = JSON.parse(localStorage.getItem('nexusUsers') || '[]');
            const user = savedUsers.find(u => u.username === username && u.password === password);

            if (user) {
                sessionStorage.setItem('nexusUser', username);
                sessionStorage.setItem('nexusFullname', user.fullname || username);
                sessionStorage.setItem('nexusIsAdmin', 'false');

                // Ensure user is in allUsers list
                const allUsers = JSON.parse(localStorage.getItem('nexusAllUsers') || '[]');
                if (!allUsers.find(u => u.username === username)) {
                    allUsers.push({ fullname: user.fullname, username, password, isAdmin: false });
                    localStorage.setItem('nexusAllUsers', JSON.stringify(allUsers));
                }

                window.location.href = 'dashboard.html';
            } else {
                alert('Invalid credentials! Use admin (satyajeet18 / 4918) or register a new account.');
            }
        });
    </script>
</body>
</html>
